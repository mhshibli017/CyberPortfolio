<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Admin Terminal | MH_ROOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4">

    <div id="login-screen" class="fixed inset-0 z-[1000] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <i data-lucide="shield-lock" class="w-12 h-12 text-sky-500 mx-auto mb-4"></i>
                <h2 class="text-2xl font-bold mono">SYSTEM_ACCESS</h2>
            </div>
            <div id="login-fields">
                <input type="text" id="user" placeholder="Username" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-4 outline-none focus:border-sky-500">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-6 outline-none focus:border-sky-500">
                <button onclick="attemptLogin()" class="w-full bg-sky-600 p-3 rounded-lg font-bold hover:bg-sky-500 transition">AUTHORIZE</button>
                <button onclick="toggleForgot(true)" class="w-full text-slate-500 text-xs mt-4 hover:text-sky-400">Forgot Credentials?</button>
            </div>
            <div id="forgot-fields" class="hidden">
                <input type="text" id="f-user" placeholder="Your Username" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-4">
                <input type="text" id="f-key" placeholder="Security Key (MH-SECURE-99)" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-4">
                <input type="password" id="f-newpass" placeholder="New Password" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 mb-6">
                <button onclick="resetPassword()" class="w-full bg-emerald-600 p-3 rounded-lg font-bold">RESET PASSWORD</button>
                <button onclick="toggleForgot(false)" class="w-full text-slate-500 text-xs mt-4">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden max-w-6xl mx-auto">
        <header class="glass p-6 rounded-2xl flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold mono"><span class="text-sky-500">~/root/</span>admin_panel</h1>
            <button onclick="logout()" class="text-red-400 text-xs font-bold border border-red-400/30 px-4 py-2 rounded-lg hover:bg-red-400/10">LOGOUT</button>
        </header>

        <div class="grid md:grid-cols-4 gap-6">
            <nav class="glass p-4 rounded-xl h-fit">
                <div class="space-y-2" id="menu">
                    <button onclick="showTab('profile')" class="w-full text-left p-3 rounded-lg bg-sky-500/10 text-sky-500 font-bold flex items-center gap-3"><i data-lucide="user"></i> Profile</button>
                    <button onclick="showTab('education')" class="w-full text-left p-3 rounded-lg text-slate-400 flex items-center gap-3"><i data-lucide="book"></i> Education</button>
                    <button onclick="showTab('arsenal')" class="w-full text-left p-3 rounded-lg text-slate-400 flex items-center gap-3"><i data-lucide="crosshair"></i> Arsenal</button>
                    <button onclick="showTab('projects')" class="w-full text-left p-3 rounded-lg text-slate-400 flex items-center gap-3"><i data-lucide="code"></i> Projects</button>
                    <button onclick="showTab('gallery')" class="w-full text-left p-3 rounded-lg text-slate-400 flex items-center gap-3"><i data-lucide="image"></i> Gallery</button>
                    <button onclick="showTab('settings')" class="w-full text-left p-3 rounded-lg text-amber-500 flex items-center gap-3 border-t border-white/10 pt-4 mt-4"><i data-lucide="settings"></i> Auth Settings</button>
                </div>
            </nav>

            <main class="md:col-span-3 space-y-6">
                <section id="gallery" class="tab-content glass p-6 rounded-xl">
                    <h2 class="text-lg font-bold mb-4">Gallery & Archives</h2>
                    <div class="bg-black/20 p-6 rounded-lg border border-white/5 mb-6">
                        <label class="block text-xs font-bold text-slate-400 mb-2">Upload from PC</label>
                        <input type="file" id="gal-file" class="mb-4 block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-sky-500/10 file:text-sky-500 hover:file:bg-sky-500/20">
                        <input type="text" id="gal-title" placeholder="Image Title" class="w-full bg-black/40 border border-white/10 rounded p-2 mb-4 text-sm">
                        <textarea id="gal-desc" placeholder="Details" class="w-full bg-black/40 border border-white/10 rounded p-2 mb-4 text-sm"></textarea>
                        <button onclick="uploadAndSaveGallery()" class="bg-sky-600 px-6 py-2 rounded font-bold text-sm">Upload & Save</button>
                    </div>
                    <div id="gal-list" class="grid grid-cols-3 gap-4"></div>
                </section>

                <section id="settings" class="tab-content glass p-6 rounded-xl">
                    <h2 class="text-lg font-bold mb-4 text-amber-500">Security & Credentials</h2>
                    <div class="bg-black/20 p-6 rounded-lg border border-white/5">
                        <input type="text" id="new-user" placeholder="New Username" class="w-full bg-black/40 border border-white/10 rounded p-3 mb-4">
                        <input type="password" id="new-pass" placeholder="New Password" class="w-full bg-black/40 border border-white/10 rounded p-3 mb-6">
                        <button onclick="updateCredentials()" class="bg-amber-600 px-8 py-3 rounded-lg font-bold hover:bg-amber-500 transition">Update Credentials</button>
                    </div>
                </section>
                
                </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://cyberportfolio-ax05.onrender.com/api';
        let currentUser = "";

        // AUTHENTICATION
        async function attemptLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: p}) });
            if(res.ok) {
                currentUser = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                showTab('profile');
            } else { alert("ACCESS DENIED!"); }
        }

        function logout() { location.reload(); }

        function toggleForgot(show) {
            document.getElementById('login-fields').classList.toggle('hidden', show);
            document.getElementById('forgot-fields').classList.toggle('hidden', !show);
        }

        async function resetPassword() {
            const payload = { username: document.getElementById('f-user').value, security_key: document.getElementById('f-key').value, new_password: document.getElementById('f-newpass').value };
            const res = await fetch(`${API_BASE}/forgot-password`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Password Reset Success!"); toggleForgot(false); } else { alert("Failed! Check Security Key."); }
        }

        async function updateCredentials() {
            const newUser = document.getElementById('new-user').value;
            const newPass = document.getElementById('new-pass').value;
            const res = await fetch(`${API_BASE}/update-auth`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({old_user: currentUser, new_user: newUser, new_pass: newPass}) });
            if(res.ok) { alert("Credentials Updated! Please login again."); logout(); }
        }

        // IMAGE UPLOAD & GALLERY
        async function uploadAndSaveGallery() {
            const fileInput = document.getElementById('gal-file');
            if(!fileInput.files[0]) return alert("Select a file first");

            // 1. Upload to Supabase Bucket via Server
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            
            const uploadRes = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();

            // 2. Save Metadata to DB
            const payload = { title: document.getElementById('gal-title').value, image_url: uploadData.url, details: document.getElementById('gal-desc').value };
            await fetch(`${API_BASE}/gallery`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            
            alert("Success!"); loadGalleryList();
        }

        // TAB SWITCHING
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'gallery') loadGalleryList();
        }

        async function loadGalleryList() {
            const res = await fetch(`${API_BASE}/gallery`);
            const data = await res.json();
            const list = document.getElementById('gal-list'); list.innerHTML = '';
            data.forEach(item => {
                list.innerHTML += `
                    <div class="bg-black/40 border border-white/5 p-2 rounded relative group">
                        <img src="${item.image_url}" class="h-20 w-full object-cover rounded mb-1">
                        <button onclick="deleteItem('gallery', ${item.id}, loadGalleryList)" class="absolute top-1 right-1 text-red-500 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
            });
            lucide.createIcons();
        }

        async function deleteItem(table, id, callback) {
            if(!confirm("Delete permanently?")) return;
            await fetch(`${API_BASE}/${table}/${id}`, { method: 'DELETE' });
            callback();
        }
    </script>
</body>
</html>
