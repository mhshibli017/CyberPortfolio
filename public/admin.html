<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH_ROOT | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-screen" class="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8 rounded-3xl shadow-2xl border-sky-500/20">
            <div class="text-center mb-8">
                <i data-lucide="shield-check" class="w-16 h-16 text-sky-500 mx-auto mb-4 animate-pulse"></i>
                <h2 class="text-2xl font-black mono tracking-tighter">AUTH_REQUIRED</h2>
            </div>
            <div id="auth-box">
                <div id="login-fields">
                    <input type="text" id="user" placeholder="Username" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 outline-none focus:border-sky-500 text-sm mono">
                    <input type="password" id="pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-6 outline-none focus:border-sky-500 text-sm mono">
                    <button onclick="handleLogin()" class="w-full bg-sky-600 p-4 rounded-xl font-bold hover:bg-sky-500 transition shadow-lg shadow-sky-500/20">INITIALIZE ACCESS</button>
                    <button onclick="toggleForgot(true)" class="w-full text-slate-500 text-[10px] mt-6 hover:text-sky-400 mono tracking-wider">FORGOT CREDENTIALS?</button>
                </div>
                <div id="forgot-fields" class="hidden">
                    <input type="text" id="f-user" placeholder="Target Username" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 text-sm mono">
                    <input type="text" id="f-key" placeholder="Security Key (MH-ROOT-2026)" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 text-sm mono">
                    <input type="password" id="f-newpass" placeholder="New Password" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-6 text-sm mono">
                    <button onclick="handleForgot()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold">RECOVER SYSTEM</button>
                    <button onclick="toggleForgot(false)" class="w-full text-slate-500 text-[10px] mt-4 mono tracking-wider">RETURN TO LOGIN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden max-w-7xl mx-auto">
        <header class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center mb-8 border-white/5">
            <div class="flex items-center gap-4">
                <div class="bg-sky-500/20 p-3 rounded-2xl border border-sky-500/30"><i data-lucide="layout-dashboard" class="text-sky-500"></i></div>
                <div>
                    <h1 class="text-xl font-black mono tracking-tight text-white uppercase">MH_ROOT <span class="text-sky-500">CMS</span></h1>
                    <p class="text-[10px] text-emerald-500 mono uppercase tracking-widest">Active Session // Secure Node</p>
                </div>
            </div>
            <button onclick="location.reload()" class="mt-4 md:mt-0 text-red-400 text-xs font-bold border border-red-500/20 px-6 py-2 rounded-full hover:bg-red-500/10 transition">LOGOUT</button>
        </header>

        <div class="grid md:grid-cols-4 gap-8">
            <nav class="md:col-span-1 space-y-4">
                <div class="glass p-3 rounded-3xl space-y-1">
                    <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="user" class="w-5 h-5"></i> Profile</button>
                    <button onclick="switchTab('education')" id="btn-education" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="book-open" class="w-5 h-5"></i> Education</button>
                    <button onclick="switchTab('arsenal')" id="btn-arsenal" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="crosshair" class="w-5 h-5"></i> Arsenal</button>
                    <button onclick="switchTab('projects')" id="btn-projects" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="terminal" class="w-5 h-5"></i> Projects</button>
                    <button onclick="switchTab('achievements')" id="btn-achievements" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="award" class="w-5 h-5"></i> Achievement</button>
                    <button onclick="switchTab('gallery')" id="btn-gallery" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="image" class="w-5 h-5"></i> Archive</button>
                    <button onclick="switchTab('messages')" id="btn-messages" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="message-square" class="w-5 h-5"></i> Messages</button>
                </div>
                
                <div class="glass p-6 rounded-3xl border-amber-500/10">
                    <p class="text-[10px] font-bold text-amber-500 mono uppercase mb-4 tracking-widest">Update Credentials</p>
                    <input type="text" id="new-user" placeholder="New Username" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 mb-3 text-xs mono">
                    <input type="password" id="new-pass" placeholder="New Password" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 mb-4 text-xs mono">
                    <button onclick="updateCreds()" class="w-full bg-amber-600/20 text-amber-500 border border-amber-500/30 p-3 rounded-xl text-[10px] font-bold uppercase hover:bg-amber-500/20 transition">Save Changes</button>
                </div>
            </nav>

            <main class="md:col-span-3">
                
                <div id="tab-profile" class="tab-content glass p-8 rounded-3xl active">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3 border-b border-white/10 pb-4"><i data-lucide="user" class="text-sky-500"></i> Profile Management</h2>
                    <form id="form-profile" onsubmit="saveProfile(event)" class="space-y-4">
                        <input type="text" id="prof-full_name" placeholder="Full Name" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <input type="text" id="prof-job_title" placeholder="Professional Title" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="prof-bio" placeholder="Biography" rows="5" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-sky-600 px-8 py-3 rounded-xl font-bold text-sm hover:bg-sky-500 transition">Save Profile</button>
                    </form>
                </div>

                <div id="tab-education" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="book-open" class="text-emerald-500"></i> Education Records</span>
                        <button onclick="resetForm('education')" class="text-xs bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded border border-emerald-500/20">Add New</button>
                    </h2>
                    <form id="form-education" onsubmit="saveData(event, 'education')" class="space-y-4 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5">
                        <input type="hidden" id="edu-id">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="edu-degree" placeholder="Degree (e.g. BSc)" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="edu-institution" placeholder="Institution Name" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="edu-pass_year" placeholder="Passing Year" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="edu-core_focus" placeholder="Core Focus (Optional)" class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <input type="text" id="edu-active_thesis" placeholder="Active Thesis Title (Optional)" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="edu-details" placeholder="Full Details/Description" rows="3" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-emerald-600 px-8 py-3 rounded-xl font-bold text-sm">Save Education</button>
                    </form>
                    <div id="list-education" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-arsenal" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="crosshair" class="text-rose-500"></i> Cyber Arsenal</span>
                        <button onclick="resetForm('arsenal')" class="text-xs bg-rose-500/10 text-rose-500 px-3 py-1 rounded border border-rose-500/20">Add New</button>
                    </h2>
                    <form id="form-arsenal" onsubmit="saveData(event, 'arsenal')" class="space-y-4 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5">
                        <input type="hidden" id="ars-id">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="ars-title" placeholder="Tool/Skill Name" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="ars-category" placeholder="Category (e.g. Framework)" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <textarea id="ars-details" placeholder="Comma separated details" rows="2" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-rose-600 px-8 py-3 rounded-xl font-bold text-sm">Save Tool</button>
                    </form>
                    <div id="list-arsenal" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-projects" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="terminal" class="text-purple-500"></i> Projects</span>
                        <button onclick="resetForm('projects')" class="text-xs bg-purple-500/10 text-purple-500 px-3 py-1 rounded border border-purple-500/20">Add New</button>
                    </h2>
                    <form id="form-projects" onsubmit="saveData(event, 'projects')" class="space-y-4 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5">
                        <input type="hidden" id="proj-id">
                        <input type="text" id="proj-title" placeholder="Project Title" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="proj-description" placeholder="Description" rows="3" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="proj-tags" placeholder="Tags (React, Node, etc)" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="proj-link" placeholder="Live Link / GitHub (Optional)" class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <button type="submit" class="bg-purple-600 px-8 py-3 rounded-xl font-bold text-sm">Save Project</button>
                    </form>
                    <div id="list-projects" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-achievements" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="award" class="text-amber-500"></i> Achievements</span>
                        <button onclick="resetForm('achievements')" class="text-xs bg-amber-500/10 text-amber-500 px-3 py-1 rounded border border-amber-500/20">Add New</button>
                    </h2>
                    <form id="form-achievements" onsubmit="saveData(event, 'achievements')" class="space-y-4 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5">
                        <input type="hidden" id="ach-id">
                        <div class="grid grid-cols-3 gap-4">
                            <input type="text" id="ach-title" placeholder="Achievement Name" required class="col-span-2 bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="ach-year" placeholder="Year" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <input type="text" id="ach-organization" placeholder="Organization / Issuer" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="ach-details" placeholder="Details" rows="2" required class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-amber-600 px-8 py-3 rounded-xl font-bold text-sm">Save Achievement</button>
                    </form>
                    <div id="list-achievements" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-gallery" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="image" class="text-sky-500"></i> Visual Archives</span>
                    </h2>
                    <div class="bg-black/20 p-6 rounded-3xl border border-white/5 mb-8">
                        <div class="text-center mb-6">
                            <input type="file" id="gal-file" class="hidden" onchange="previewImg(event)">
                            <label for="gal-file" class="cursor-pointer block border-2 border-dashed border-white/10 p-6 rounded-2xl hover:border-sky-500/50 transition bg-black/40">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-sky-500 mx-auto mb-2"></i>
                                <p class="text-xs text-slate-400">Click to Select Image from PC</p>
                                <img id="img-preview" class="mt-4 h-24 mx-auto hidden rounded border border-white/20">
                            </label>
                        </div>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="gal-title" placeholder="Image Title" class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                                <input type="text" id="gal-subtitle" placeholder="Subtitle / Date" class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            </div>
                            <textarea id="gal-details" placeholder="Full Details (For Lightbox)" rows="2" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                            <button onclick="uploadAndSaveGallery()" id="gal-btn" class="w-full bg-sky-600 p-3 rounded-xl font-bold text-sm hover:bg-sky-500">Upload & Save Image</button>
                        </div>
                    </div>
                    <div id="list-gallery" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>

                <div id="tab-messages" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex justify-between items-center border-b border-white/10 pb-4">
                        <span class="flex items-center gap-3"><i data-lucide="message-square" class="text-emerald-500"></i> Transmissions</span>
                        <button onclick="loadList('messages')" class="text-slate-400 hover:text-white"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                    </h2>
                    <div id="list-messages" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
                </div>

            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://cyberportfolio-ax05.onrender.com/api';
        let currentAdmin = "";
        let globalData = {}; // Store fetched data for editing

        // ================= AUTHENTICATION =================
        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            try {
                const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: p}) });
                if(res.ok) {
                    currentAdmin = u;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    switchTab('profile'); // Load initial tab
                } else { alert("ACCESS DENIED: Wrong Credentials"); }
            } catch(e) { alert("Server Error. Make sure backend is running."); }
        }

        function toggleForgot(show) {
            document.getElementById('login-fields').classList.toggle('hidden', show);
            document.getElementById('forgot-fields').classList.toggle('hidden', !show);
        }

        async function handleForgot() {
            const payload = { username: document.getElementById('f-user').value, security_key: document.getElementById('f-key').value, new_password: document.getElementById('f-newpass').value };
            const res = await fetch(`${API_BASE}/forgot-creds`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Success! Password Reset."); toggleForgot(false); } else { alert("Failed. Invalid Key."); }
        }

        async function updateCreds() {
            const newUser = document.getElementById('new-user').value;
            const newPass = document.getElementById('new-pass').value;
            if(!newUser || !newPass) return alert("Fields cannot be empty");
            const res = await fetch(`${API_BASE}/update-auth`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({old_user: currentAdmin, new_user: newUser, new_pass: newPass}) });
            if(res.ok) { alert("Credentials Updated. Please Re-login."); location.reload(); }
        }

        // ================= TAB MANAGEMENT =================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-sky-500/10', 'text-sky-500', 'shadow-lg');
                b.classList.add('text-slate-400');
            });
            
            document.getElementById('tab-'+tabId).classList.add('active');
            const activeBtn = document.getElementById('btn-'+tabId);
            activeBtn.classList.remove('text-slate-400');
            activeBtn.classList.add('bg-sky-500/10', 'text-sky-500', 'shadow-lg');
            
            if(tabId === 'profile') loadProfile();
            else loadList(tabId);
        }

        function resetForm(table) {
            const form = document.getElementById(`form-${table}`);
            if(form) {
                form.reset();
                const idField = document.getElementById(table === 'education' ? 'edu-id' : table === 'arsenal' ? 'ars-id' : table === 'projects' ? 'proj-id' : 'ach-id');
                if(idField) idField.value = '';
                form.querySelector('button[type="submit"]').innerText = `Save ${table}`;
            }
        }

        // ================= PROFILE CRUD =================
        async function loadProfile() {
            const res = await fetch(`${API_BASE}/profile`);
            const data = await res.json();
            if(data && data.full_name) {
                document.getElementById('prof-full_name').value = data.full_name;
                document.getElementById('prof-job_title').value = data.job_title;
                document.getElementById('prof-bio').value = data.bio;
            }
        }

        async function saveProfile(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = "Saving...";
            const payload = { full_name: document.getElementById('prof-full_name').value, job_title: document.getElementById('prof-job_title').value, bio: document.getElementById('prof-bio').value };
            await fetch(`${API_BASE}/profile`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            btn.innerText = "Saved!"; setTimeout(()=> btn.innerText = "Save Profile", 2000);
        }

        // ================= DYNAMIC CRUD FOR ALL LISTS =================
        async function loadList(table) {
            const res = await fetch(`${API_BASE}/${table}`);
            const data = await res.json();
            globalData[table] = data; // Store for editing
            const container = document.getElementById(`list-${table}`);
            container.innerHTML = '';
            
            if(data.length === 0) { container.innerHTML = `<p class="text-xs text-slate-500 mono">No records found.</p>`; return; }

            data.forEach(item => {
                if(table === 'gallery') {
                    container.innerHTML += `
                        <div class="bg-black/40 border border-white/5 p-2 rounded-xl relative group">
                            <img src="${item.image_url}" class="h-24 w-full object-cover rounded-lg mb-2">
                            <button onclick="deleteRecord('${table}', ${item.id})" class="absolute top-3 right-3 bg-red-500/80 text-white p-1 rounded opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            <p class="text-[10px] font-bold text-white truncate px-1">${item.title}</p>
                        </div>`;
                } else if(table === 'messages') {
                    container.innerHTML += `
                        <div class="bg-black/30 border border-white/5 p-4 rounded-2xl relative group">
                            <button onclick="deleteRecord('messages', ${item.id})" class="absolute top-4 right-4 text-red-500 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            <p class="text-sky-500 font-bold text-sm">${item.identity_name}</p>
                            <p class="text-[10px] text-slate-500 mb-2 mono">${item.contact_vector}</p>
                            <p class="text-xs text-slate-300 bg-black/40 p-3 rounded-lg border border-white/5">${item.data_payload}</p>
                        </div>`;
                } else {
                    // Generic List Item for Edu, Ars, Proj, Ach
                    const title = item.degree || item.title;
                    const sub = item.institution || item.category || item.tags || item.organization;
                    container.innerHTML += `
                        <div class="bg-black/30 border border-white/5 p-4 rounded-xl flex justify-between items-center group hover:border-sky-500/30 transition">
                            <div>
                                <p class="text-white font-bold text-sm">${title}</p>
                                <p class="text-slate-500 text-[10px] uppercase mono">${sub}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editRecord('${table}', ${item.id})" class="p-2 text-sky-500 hover:bg-sky-500/20 rounded"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteRecord('${table}', ${item.id})" class="p-2 text-red-500 hover:bg-red-500/20 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>`;
                }
            });
            lucide.createIcons();
        }

        async function saveData(e, table) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]'); 
            const orgText = btn.innerText; btn.innerText = 'Saving...';
            
            // Map table prefixes to input IDs
            const pfx = table === 'education' ? 'edu' : table === 'arsenal' ? 'ars' : table === 'projects' ? 'proj' : 'ach';
            const id = document.getElementById(`${pfx}-id`).value;
            
            let payload = {};
            if(table === 'education') payload = { degree: document.getElementById('edu-degree').value, institution: document.getElementById('edu-institution').value, pass_year: document.getElementById('edu-pass_year').value, details: document.getElementById('edu-details').value, active_thesis: document.getElementById('edu-active_thesis').value || null, core_focus: document.getElementById('edu-core_focus').value || null };
            if(table === 'arsenal') payload = { title: document.getElementById('ars-title').value, category: document.getElementById('ars-category').value, details: document.getElementById('ars-details').value };
            if(table === 'projects') payload = { title: document.getElementById('proj-title').value, description: document.getElementById('proj-description').value, tags: document.getElementById('proj-tags').value, link: document.getElementById('proj-link').value || null };
            if(table === 'achievements') payload = { title: document.getElementById('ach-title').value, organization: document.getElementById('ach-organization').value, year: document.getElementById('ach-year').value, details: document.getElementById('ach-details').value };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_BASE}/${table}/${id}` : `${API_BASE}/${table}`;
            
            await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            resetForm(table); loadList(table);
            btn.innerText = 'Saved!'; setTimeout(() => btn.innerText = orgText, 1500);
        }

        function editRecord(table, id) {
            const item = globalData[table].find(x => x.id === id);
            const pfx = table === 'education' ? 'edu' : table === 'arsenal' ? 'ars' : table === 'projects' ? 'proj' : 'ach';
            document.getElementById(`${pfx}-id`).value = item.id;
            
            if(table === 'education') {
                document.getElementById('edu-degree').value = item.degree;
                document.getElementById('edu-institution').value = item.institution;
                document.getElementById('edu-pass_year').value = item.pass_year;
                document.getElementById('edu-details').value = item.details;
                document.getElementById('edu-active_thesis').value = item.active_thesis || '';
                document.getElementById('edu-core_focus').value = item.core_focus || '';
            }
            if(table === 'arsenal') {
                document.getElementById('ars-title').value = item.title;
                document.getElementById('ars-category').value = item.category;
                document.getElementById('ars-details').value = item.details;
            }
            if(table === 'projects') {
                document.getElementById('proj-title').value = item.title;
                document.getElementById('proj-description').value = item.description;
                document.getElementById('proj-tags').value = item.tags;
                document.getElementById('proj-link').value = item.link || '';
            }
            if(table === 'achievements') {
                document.getElementById('ach-title').value = item.title;
                document.getElementById('ach-organization').value = item.organization;
                document.getElementById('ach-year').value = item.year;
                document.getElementById('ach-details').value = item.details;
            }
            
            document.querySelector(`#form-${table} button[type="submit"]`).innerText = 'Update Record';
        }

        async function deleteRecord(table, id) {
            if(!confirm("Permenantly delete this record?")) return;
            await fetch(`${API_BASE}/${table}/${id}`, { method: 'DELETE' });
            loadList(table);
        }

        // ================= GALLERY UPLOAD =================
        function previewImg(e) {
            const file = e.target.files[0];
            if(file) {
                const img = document.getElementById('img-preview');
                img.src = URL.createObjectURL(file);
                img.classList.remove('hidden');
            }
        }

        async function uploadAndSaveGallery() {
            const btn = document.getElementById('gal-btn');
            const title = document.getElementById('gal-title').value;
            const subtitle = document.getElementById('gal-subtitle').value;
            const details = document.getElementById('gal-details').value;
            const fileInput = document.getElementById('gal-file');
            
            if(!fileInput.files[0] || !title) return alert("Image and Title are required!");
            
            btn.innerText = "UPLOADING TO DB..."; btn.classList.add('opacity-50');
            
            // Upload to backend/Supabase Storage
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            
            try {
                const uploadRes = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                if(!uploadRes.ok) throw new Error();

                // Save data to table
                const payload = { title, subtitle, details, image_url: uploadData.url };
                await fetch(`${API_BASE}/gallery`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                
                alert("Upload Successful!");
                document.getElementById('gal-title').value = '';
                document.getElementById('gal-subtitle').value = '';
                document.getElementById('gal-details').value = '';
                fileInput.value = '';
                document.getElementById('img-preview').classList.add('hidden');
                loadList('gallery');
            } catch(e) { alert("Upload Failed!"); }
            
            btn.innerText = "Upload & Sync Image"; btn.classList.remove('opacity-50');
        }
    </script>
</body>
</html>
