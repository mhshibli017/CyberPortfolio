<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin | Cyber OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; transition: all 0.5s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bg-cyber { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05), transparent 80%), linear-gradient(to bottom, rgba(2, 6, 23, 0.95), rgba(2, 6, 23, 1)); }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; transition: all 0.3s; }
        .glass-nav { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 100; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.5); border-radius: 4px; }
        
        /* Light Mode */
        body.light-mode { background-color: #d1d5db; color: #0f172a; }
        body.light-mode .glass-panel { background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0, 0, 0, 0.1); color: #1e293b; }
        body.light-mode input, body.light-mode textarea { background-color: rgba(255,255,255,0.9)!important; color: #0f172a!important; }
        body.light-mode .glass-nav { color: #fff; }
    </style>
</head>
<body>
    <div class="bg-cyber"></div>

    <nav class="fixed top-0 w-full glass-nav">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="shield-alert" class="w-5 h-5 text-red-500 animate-pulse"></i>
                <span class="text-xs font-bold uppercase tracking-[0.2em] mono text-red-500">Admin_Terminal</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-full bg-white/5 hover:bg-white/10 transition border border-white/10">
                    <i data-lucide="sun" class="w-4 h-4 text-amber-400"></i>
                </button>
                <button id="logoutBtn" class="hidden text-[10px] font-bold mono bg-red-500/10 text-red-500 px-3 py-1.5 rounded border border-red-500/20">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-24 pb-20">
        
        <section id="loginSection" class="min-h-[70vh] flex items-center justify-center">
            <div class="glass-panel p-8 w-full max-w-md border-t-2 border-red-500/50">
                <div class="text-center mb-8">
                    <i data-lucide="fingerprint" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                    <h2 class="text-2xl font-black">System Auth</h2>
                </div>
                <form id="loginForm" class="space-y-4">
                    <input type="text" id="username" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-sm outline-none focus:border-red-500 text-white" placeholder="Root_User">
                    <input type="password" id="password" class="w-full bg-black/40 border border-white/10 rounded-lg px-4 py-3 text-sm outline-none focus:border-red-500 text-white" placeholder="Passkey">
                    <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold text-[10px] uppercase">Initialize Uplink</button>
                    <p id="loginError" class="text-red-500 text-[10px] text-center hidden">Invalid Credentials</p>
                </form>
            </div>
        </section>

        <section id="dashboardSection" class="hidden space-y-8">
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-panel p-4 text-center border-l-2 border-sky-500"><p class="text-[10px] text-slate-500 uppercase mono">CPU</p><p class="text-2xl font-black text-sky-500"><span id="stat-cpu">0.0</span>%</p></div>
                <div class="glass-panel p-4 text-center border-l-2 border-emerald-500"><p class="text-[10px] text-slate-500 uppercase mono">RAM</p><p class="text-2xl font-black text-emerald-500"><span id="stat-ram">0.0</span>%</p></div>
                <div class="glass-panel p-4 text-center border-l-2 border-purple-500"><p class="text-[10px] text-slate-500 uppercase mono">Ping</p><p class="text-2xl font-black text-purple-500"><span id="stat-ping">0</span>ms</p></div>
            </div>

            <div class="grid lg:grid-cols-2 gap-8">
                <div class="space-y-8">
                    <div class="glass-panel p-6 border-t-2 border-blue-500">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="user" class="w-5 h-5 text-blue-500"></i> Profile Management</h3>
                        <form id="profileForm" class="space-y-3">
                            <input type="hidden" id="p-id">
                            <input type="text" id="p-name" placeholder="Full Name" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <input type="text" id="p-title" placeholder="Job Title" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <textarea id="p-bio" placeholder="Biography details..." rows="3" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none"></textarea>
                            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold w-full uppercase">Update Profile</button>
                        </form>
                    </div>

                    <div class="glass-panel p-6 border-t-2 border-emerald-500">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="graduation-cap" class="w-5 h-5 text-emerald-500"></i> Education Records</h3>
                        <form id="addEduForm" class="bg-black/20 p-4 rounded-xl mb-4 space-y-3">
                            <input type="text" id="e-degree" placeholder="Degree (e.g., BSc Computer Science)" required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="e-inst" placeholder="Institution" required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                                <input type="text" id="e-year" placeholder="Year (e.g., May 2026)" required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            </div>
                            <textarea id="e-details" placeholder="Details/Description..." required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none" rows="2"></textarea>
                            <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded text-[10px] font-bold w-full uppercase">Add Education</button>
                        </form>
                        <div id="eduList" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2"></div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="glass-panel p-6 border-t-2 border-purple-500">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="briefcase" class="w-5 h-5 text-purple-500"></i> Project Deployment</h3>
                        <form id="addProjForm" class="bg-black/20 p-4 rounded-xl mb-4 space-y-3">
                            <input type="text" id="pr-title" placeholder="Project Title" required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <input type="text" id="pr-tags" placeholder="Tags (comma separated e.g., Python, ML)" required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <textarea id="pr-desc" placeholder="Project Description..." required class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none" rows="2"></textarea>
                            <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded text-[10px] font-bold w-full uppercase">Deploy Project</button>
                        </form>
                        <div id="projList" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2"></div>
                    </div>

                    <div class="glass-panel p-6 border-t-2 border-amber-500">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="image" class="w-5 h-5 text-amber-500"></i> Visual Archives</h3>
                        <form id="addGalleryForm" class="bg-black/20 p-4 rounded-xl mb-4 space-y-3">
                            <input type="file" id="g-img" accept="image/*" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-slate-300 outline-none">
                            <input type="text" id="g-title" placeholder="Title" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none">
                            <textarea id="g-details" placeholder="Details" class="w-full bg-black/40 border border-white/10 rounded px-3 py-2 text-xs text-white outline-none" rows="2"></textarea>
                            <button type="submit" class="bg-amber-600 text-white px-4 py-2 rounded text-[10px] font-bold w-full uppercase">Upload Archive</button>
                        </form>
                        <div id="galleryList" class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2"></div>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-6 border-t-2 border-red-500">
                <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="mail" class="w-5 h-5 text-red-500"></i> Secure Comms (Inbox)</h3>
                <div id="messageList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar p-2">
                    <p class="text-xs text-slate-500 mono">Fetching secure messages...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="msgLightbox" class="fixed inset-0 modal-overlay z-[200] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="glass-panel max-w-3xl w-full p-8 relative transform scale-95 transition-transform duration-300">
            <button onclick="closeMsgLightbox()" class="absolute top-4 right-4 text-slate-400 hover:text-white bg-black/40 p-2 rounded-full border border-white/5"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="border-b border-white/10 pb-4 mb-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] font-bold text-emerald-500 mono uppercase tracking-widest mb-1">Decrypted Payload</p>
                        <h2 class="text-2xl font-black text-white uppercase" id="lb-name"></h2>
                        <p class="text-sm text-sky-400 font-mono" id="lb-email"></p>
                    </div>
                    <div class="text-right bg-black/30 p-2 rounded-lg border border-white/5">
                        <p class="text-[10px] text-slate-400 mono uppercase">Received Timestamp</p>
                        <p class="text-xs font-bold text-white mono" id="lb-date"></p>
                    </div>
                </div>
            </div>
            <div class="bg-black/30 p-6 rounded-xl border border-white/5 max-h-[50vh] overflow-y-auto custom-scrollbar">
                <p id="lb-msg" class="text-slate-300 font-mono text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://cyberportfolio-ax05.onrender.com/api'; // <-- Render লাইভ লিংক হলে এখানে লিংক বসান (e.g. 'https://your-site.onrender.com/api')

        // Theme
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            themeToggle.innerHTML = document.body.classList.contains('light-mode') ? '<i data-lucide="moon" class="w-4 h-4 text-slate-600"></i>' : '<i data-lucide="sun" class="w-4 h-4 text-amber-400"></i>';
            lucide.createIcons();
        });

        // Auth
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value}) });
            const data = await res.json();
            if(data.success) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                initDashboard();
            } else document.getElementById('loginError').classList.remove('hidden');
        });
        document.getElementById('logoutBtn').addEventListener('click', () => location.reload());

        function initDashboard() {
            setInterval(async () => {
                try {
                    const data = await (await fetch(`${API_BASE}/stats`)).json();
                    document.getElementById('stat-cpu').innerText = data.cpu;
                    document.getElementById('stat-ram').innerText = data.ram;
                    document.getElementById('stat-ping').innerText = data.ping;
                } catch(e){}
            }, 3000);
            loadProfile(); loadEducation(); loadProjects(); loadGallery(); loadMessages();
        }

        // --- Profile CRUD ---
        async function loadProfile() {
            const data = await (await fetch(`${API_BASE}/profile`)).json();
            if(data.id) {
                document.getElementById('p-id').value = data.id;
                document.getElementById('p-name').value = data.full_name;
                document.getElementById('p-title').value = data.job_title;
                document.getElementById('p-bio').value = data.bio;
            }
        }
        document.getElementById('profileForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            await fetch(`${API_BASE}/profile`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: document.getElementById('p-id').value, full_name: document.getElementById('p-name').value, job_title: document.getElementById('p-title').value, bio: document.getElementById('p-bio').value }) });
            alert('Profile Updated Successfully!');
        });

        // --- Education CRUD ---
        async function loadEducation() {
            const items = await (await fetch(`${API_BASE}/education`)).json();
            const list = document.getElementById('eduList'); list.innerHTML = '';
            items.forEach(item => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black/30 p-3 rounded border border-white/5"><div class="truncate pr-2"><p class="text-xs font-bold text-white">${item.degree}</p><p class="text-[10px] text-slate-400">${item.institution}</p></div><button onclick="deleteRow('education', ${item.id})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
            });
            lucide.createIcons();
        }
        document.getElementById('addEduForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            await fetch(`${API_BASE}/education`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ degree: document.getElementById('e-degree').value, institution: document.getElementById('e-inst').value, pass_year: document.getElementById('e-year').value, details: document.getElementById('e-details').value }) });
            e.target.reset(); loadEducation();
        });

        // --- Projects CRUD ---
        async function loadProjects() {
            const items = await (await fetch(`${API_BASE}/projects`)).json();
            const list = document.getElementById('projList'); list.innerHTML = '';
            items.forEach(item => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black/30 p-3 rounded border border-white/5"><div class="truncate pr-2"><p class="text-xs font-bold text-white">${item.title}</p><p class="text-[10px] text-slate-400">${item.tags}</p></div><button onclick="deleteRow('projects', ${item.id})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
            });
            lucide.createIcons();
        }
        document.getElementById('addProjForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            await fetch(`${API_BASE}/projects`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title: document.getElementById('pr-title').value, tags: document.getElementById('pr-tags').value, description: document.getElementById('pr-desc').value }) });
            e.target.reset(); loadProjects();
        });

        // --- Archive CRUD ---
        async function loadGallery() {
            const items = await (await fetch(`${API_BASE}/gallery`)).json();
            const list = document.getElementById('galleryList'); list.innerHTML = '';
            items.forEach(item => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black/30 p-2 rounded border border-white/5"><div class="flex items-center gap-2 truncate"><img src="${item.image_url}" class="w-8 h-8 object-cover rounded"><p class="text-xs text-white truncate">${item.title}</p></div><button onclick="deleteRow('gallery', ${item.id})" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
            });
            lucide.createIcons();
        }
        document.getElementById('addGalleryForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('image', document.getElementById('g-img').files[0]);
            formData.append('title', document.getElementById('g-title').value);
            formData.append('details', document.getElementById('g-details').value);
            const btn = e.target.querySelector('button'); btn.innerText = 'UPLOADING...';
            await fetch(`${API_BASE}/gallery`, { method: 'POST', body: formData });
            btn.innerText = 'UPLOAD ARCHIVE'; e.target.reset(); loadGallery();
        });

        // Generic Delete
        async function deleteRow(table, id) {
            if(confirm('Delete permanently?')) {
                await fetch(`${API_BASE}/${table}/${id}`, { method: 'DELETE' });
                if(table==='education') loadEducation(); else if(table==='projects') loadProjects(); else if(table==='gallery') loadGallery();
            }
        }

        // --- Messages Logic with Local PC Time ---
        async function loadMessages() {
            const msgs = await (await fetch(`${API_BASE}/messages`)).json();
            const list = document.getElementById('messageList'); list.innerHTML = '';
            if(msgs.length === 0) { list.innerHTML = '<p class="text-xs text-slate-500">Inbox is empty.</p>'; return; }

            msgs.forEach(msg => {
                // Formatting Date to PC Local Time
                const localDate = new Date(msg.created_at);
                const dateOptions = { year: 'numeric', month: 'short', day: 'numeric' };
                const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
                const formattedDate = `${localDate.toLocaleDateString(undefined, dateOptions)} - ${localDate.toLocaleTimeString(undefined, timeOptions)}`;
                
                const safePayload = (msg.data_payload || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                list.innerHTML += `
                    <div class="glass-panel p-4 hover:border-emerald-500/50 transition cursor-pointer flex flex-col justify-between h-40 group" onclick="openMsgModal('${msg.identity_name}', '${msg.contact_vector}', '${safePayload}', '${formattedDate}')">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <p class="text-sm font-bold text-white uppercase truncate pr-2 group-hover:text-emerald-400 transition">${msg.identity_name}</p>
                                <button onclick="event.stopPropagation(); deleteMsg(${msg.id})" class="text-slate-500 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                            <p class="text-[10px] text-sky-400 mono mb-3 truncate">${msg.contact_vector}</p>
                            <p class="text-xs text-slate-300 line-clamp-2">${msg.data_payload}</p>
                        </div>
                        <div class="mt-4 border-t border-white/5 pt-2 text-right">
                            <p class="text-[9px] text-slate-500 mono font-bold">${formattedDate}</p>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function deleteMsg(id) {
            if(confirm('Delete message permanently?')) {
                await fetch(`${API_BASE}/messages/${id}`, { method: 'DELETE' });
                loadMessages();
            }
        }

        // Message Modal
        const msgModal = document.getElementById('msgLightbox');
        function openMsgModal(name, email, msg, date) {
            document.getElementById('lb-name').innerText = name;
            document.getElementById('lb-email').innerText = email;
            document.getElementById('lb-msg').innerText = msg;
            document.getElementById('lb-date').innerText = date;
            msgModal.classList.remove('hidden');
            setTimeout(() => msgModal.classList.remove('opacity-0'), 10);
        }
        function closeMsgLightbox() {
            msgModal.classList.add('opacity-0');
            setTimeout(() => msgModal.classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
