<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>MH_ROOT | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-screen" class="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-8 rounded-3xl shadow-2xl border-sky-500/20">
            <div class="text-center mb-8">
                <i data-lucide="shield-check" class="w-16 h-16 text-sky-500 mx-auto mb-4 animate-pulse"></i>
                <h2 class="text-2xl font-black mono tracking-tighter">AUTH_REQUIRED</h2>
            </div>
            
            <div id="auth-box">
                <div id="login-fields">
                    <input type="text" id="user" placeholder="Username" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 outline-none focus:border-sky-500 text-sm mono">
                    <input type="password" id="pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-6 outline-none focus:border-sky-500 text-sm mono">
                    <button onclick="handleLogin()" class="w-full bg-sky-600 p-4 rounded-xl font-bold hover:bg-sky-500 transition shadow-lg shadow-sky-500/20">INITIALIZE ACCESS</button>
                    <button onclick="toggleForgot(true)" class="w-full text-slate-500 text-[10px] mt-6 hover:text-sky-400 mono">FORGOT_CREDENTIALS?</button>
                </div>
                
                <div id="forgot-fields" class="hidden">
                    <input type="text" id="f-user" placeholder="Target Username" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 text-sm mono">
                    <input type="text" id="f-key" placeholder="Security Key" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-4 text-sm mono">
                    <input type="password" id="f-newpass" placeholder="New Password" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 mb-6 text-sm mono">
                    <button onclick="handleForgot()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold">RECOVER_SYSTEM</button>
                    <button onclick="toggleForgot(false)" class="w-full text-slate-500 text-[10px] mt-4 mono">RETURN_TO_LOGIN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden max-w-7xl mx-auto">
        <header class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center mb-8 border-white/5">
            <div class="flex items-center gap-4">
                <div class="bg-sky-500/20 p-3 rounded-2xl border border-sky-500/30"><i data-lucide="layout-dashboard" class="text-sky-500"></i></div>
                <div>
                    <h1 class="text-xl font-black mono tracking-tight text-white uppercase">MH_ROOT Command Center</h1>
                    <p class="text-[10px] text-emerald-500 mono uppercase tracking-widest">Active Session // Node: 0x99A3</p>
                </div>
            </div>
            <button onclick="location.reload()" class="mt-4 md:mt-0 text-red-400 text-xs font-bold border border-red-500/20 px-6 py-2 rounded-full hover:bg-red-500/10 transition">TERMINATE_SESSION</button>
        </header>

        <div class="grid md:grid-cols-4 gap-8">
            <nav class="md:col-span-1 space-y-2">
                <div class="glass p-3 rounded-3xl space-y-1">
                    <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="user" class="w-5 h-5"></i> Profile</button>
                    <button onclick="switchTab('education')" id="btn-education" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="book-open" class="w-5 h-5"></i> Education</button>
                    <button onclick="switchTab('arsenal')" id="btn-arsenal" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="crosshair" class="w-5 h-5"></i> Arsenal</button>
                    <button onclick="switchTab('projects')" id="btn-projects" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="terminal" class="w-5 h-5"></i> Project</button>
                    <button onclick="switchTab('achievements')" id="btn-achievements" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="award" class="w-5 h-5"></i> Achievements</button>
                    <button onclick="switchTab('gallery')" id="btn-gallery" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="archive" class="w-5 h-5"></i> Archive</button>
                    <button onclick="switchTab('messages')" id="btn-messages" class="nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition"><i data-lucide="message-square" class="w-5 h-5"></i> Messages</button>
                </div>
                
                <div class="glass p-6 rounded-3xl border-amber-500/10">
                    <p class="text-[10px] font-bold text-amber-500 mono uppercase mb-4 tracking-widest">System Credentials</p>
                    <input type="text" id="new-user" placeholder="New Username" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 mb-3 text-xs mono">
                    <input type="password" id="new-pass" placeholder="New Password" class="w-full bg-black/40 border border-white/5 rounded-xl p-3 mb-4 text-xs mono">
                    <button onclick="updateCreds()" class="w-full bg-amber-600/20 text-amber-500 border border-amber-500/30 p-3 rounded-xl text-[10px] font-bold uppercase hover:bg-amber-500/20 transition">Update Access</button>
                </div>
            </nav>

            <main class="md:col-span-3">
                <div id="tab-profile" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3"><i data-lucide="user" class="text-sky-500"></i> Identity Management</h2>
                    <form onsubmit="saveProfile(event)" class="space-y-4">
                        <input type="text" id="p-name" placeholder="Full Name" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <input type="text" id="p-title" placeholder="Professional Title" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="p-bio" placeholder="Biography" rows="5" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-sky-600 px-8 py-3 rounded-xl font-bold text-sm hover:bg-sky-500 transition">Update Profile</button>
                    </form>
                </div>

                <div id="tab-education" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6">Academic Records</h2>
                    <form onsubmit="saveData(event, 'education')" class="space-y-4 mb-8 bg-black/20 p-6 rounded-2xl border border-white/5">
                        <input type="hidden" id="edu-id">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="edu-degree" placeholder="Degree" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="edu-institution" placeholder="Institution" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="edu-pass_year" placeholder="Year" required class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <input type="text" id="edu-core_focus" placeholder="Core Focus (Optional)" class="bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        </div>
                        <input type="text" id="edu-active_thesis" placeholder="Active Thesis (Optional)" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                        <textarea id="edu-details" placeholder="Details" rows="3" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                        <button type="submit" class="bg-emerald-600 px-8 py-3 rounded-xl font-bold text-sm">Save Record</button>
                        <button type="button" onclick="resetForm('edu')" class="text-slate-500 text-xs ml-4">Clear</button>
                    </form>
                    <div id="list-education" class="space-y-4"></div>
                </div>

                <div id="tab-gallery" class="tab-content glass p-8 rounded-3xl">
                    <h2 class="text-xl font-bold mb-6">Visual Archives</h2>
                    <div class="bg-black/20 p-8 rounded-3xl border border-white/5 mb-8 text-center">
                        <input type="file" id="gal-file" class="hidden" onchange="previewImg(event)">
                        <label for="gal-file" class="cursor-pointer block border-2 border-dashed border-white/10 p-10 rounded-2xl hover:border-sky-500/50 transition">
                            <i data-lucide="upload-cloud" class="w-12 h-12 text-slate-500 mx-auto mb-2"></i>
                            <p class="text-sm text-slate-400">Click to upload from PC</p>
                            <img id="p-img" class="mt-4 h-32 mx-auto hidden rounded-lg border border-white/20">
                        </label>
                        <div class="mt-6 space-y-4">
                            <input type="text" id="gal-title" placeholder="Title" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm">
                            <textarea id="gal-details" placeholder="Full Details" rows="2" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm"></textarea>
                            <button onclick="uploadGallery()" id="gal-btn" class="w-full bg-sky-600 p-4 rounded-xl font-bold text-sm">Upload & Sync</button>
                        </div>
                    </div>
                    <div id="list-gallery" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                </div>

                <div id="tab-arsenal" class="tab-content glass p-8 rounded-3xl"><div id="list-arsenal"></div></div>
                <div id="tab-projects" class="tab-content glass p-8 rounded-3xl"><div id="list-projects"></div></div>
                <div id="tab-achievements" class="tab-content glass p-8 rounded-3xl"><div id="list-achievements"></div></div>
                <div id="tab-messages" class="tab-content glass p-8 rounded-3xl"><div id="list-messages"></div></div>

            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_BASE = 'https://cyberportfolio-ax05.onrender.com/api';
        let currentAdmin = "";

        // ================= AUTH LOGIC =================
        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u, password: p}) });
            if(res.ok) {
                currentAdmin = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').classList.remove('hidden');
                switchTab('profile');
            } else { alert("ACCESS_DENIED: Invalid Credentials"); }
        }

        function toggleForgot(show) {
            document.getElementById('login-fields').classList.toggle('hidden', show);
            document.getElementById('forgot-fields').classList.toggle('hidden', !show);
        }

        async function handleForgot() {
            const payload = { username: document.getElementById('f-user').value, security_key: document.getElementById('f-key').value, new_password: document.getElementById('f-newpass').value };
            const res = await fetch(`${API_BASE}/forgot-creds`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Credentials Reset Success!"); toggleForgot(false); } else { alert("Reset Failed! Validate Credentials."); }
        }

        async function updateCreds() {
            const newUser = document.getElementById('new-user').value;
            const newPass = document.getElementById('new-pass').value;
            const res = await fetch(`${API_BASE}/update-auth`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({old_user: currentAdmin, new_user: newUser, new_pass: newPass}) });
            if(res.ok) { alert("Security Updated. Re-logging..."); location.reload(); }
        }

        // ================= NAVIGATION =================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.className = "nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition text-slate-400 hover:bg-white/5");
            
            document.getElementById('tab-'+tabId).classList.add('active');
            document.getElementById('btn-'+tabId).className = "nav-btn w-full text-left p-4 rounded-2xl flex items-center gap-4 text-sm font-bold mono transition bg-sky-500/10 text-sky-500 shadow-lg shadow-sky-500/10";
            
            loadDataList(tabId);
        }

        // ================= CRUD LOGIC =================
        async function loadDataList(table) {
            if(table === 'profile') {
                const res = await fetch(`${API_BASE}/profile`);
                const data = await res.json();
                if(data.full_name) {
                    document.getElementById('p-name').value = data.full_name;
                    document.getElementById('p-title').value = data.job_title;
                    document.getElementById('p-bio').value = data.bio;
                }
                return;
            }

            const res = await fetch(`${API_BASE}/${table}`);
            const data = await res.json();
            const container = document.getElementById('list-'+table);
            if(!container) return;
            container.innerHTML = `<h2 class="text-xl font-bold mb-6 uppercase mono">${table} Management</h2>`;
            
            data.forEach(item => {
                container.innerHTML += `
                    <div class="bg-black/30 border border-white/5 p-4 rounded-2xl flex justify-between items-center group">
                        <div class="text-sm">
                            <p class="font-bold text-white">${item.title || item.degree || item.identity_name || 'No Title'}</p>
                            <p class="text-slate-500 text-xs">${item.institution || item.category || item.organization || ''}</p>
                        </div>
                        <div class="flex gap-2">
                            ${table !== 'messages' ? `<button onclick="editData('${table}', ${item.id})" class="p-2 text-sky-400 hover:bg-sky-500/10 rounded-lg"><i data-lucide="edit-2" class="w-4 h-4"></i></button>` : ''}
                            <button onclick="deleteData('${table}', ${item.id})" class="p-2 text-red-400 hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        async function saveData(e, table) {
            e.preventDefault();
            const id = document.getElementById(table === 'education' ? 'edu-id' : '').value;
            const payload = {};
            // Simplified loop for getting inputs
            const inputs = e.target.querySelectorAll('input, textarea');
            inputs.forEach(i => { if(i.id) payload[i.id.split('-')[1]] = i.value });

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_BASE}/${table}/${id}` : `${API_BASE}/${table}`;
            
            await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            alert("Success!"); e.target.reset(); loadDataList(table);
        }

        async function deleteData(table, id) {
            if(!confirm("Destroy this record permanently?")) return;
            await fetch(`${API_BASE}/${table}/${id}`, { method: 'DELETE' });
            loadDataList(table);
        }

        // ================= GALLERY SPECIAL =================
        function previewImg(e) {
            const p = document.getElementById('p-img');
            p.src = URL.createObjectURL(e.target.files[0]);
            p.classList.remove('hidden');
        }

        async function uploadGallery() {
            const btn = document.getElementById('gal-btn');
            const file = document.getElementById('gal-file').files[0];
            if(!file) return alert("Select File!");
            
            btn.innerText = "UPLOADING...";
            const formData = new FormData();
            formData.append('image', file);
            
            const upRes = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
            const upData = await upRes.json();
            
            const payload = { title: document.getElementById('gal-title').value, image_url: upData.url, details: document.getElementById('gal-details').value };
            await fetch(`${API_BASE}/gallery`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            
            alert("Archive Updated!");
            btn.innerText = "Upload & Sync";
            document.getElementById('p-img').classList.add('hidden');
            loadDataList('gallery');
        }

        async function saveProfile(e) {
            e.preventDefault();
            const payload = { full_name: document.getElementById('p-name').value, job_title: document.getElementById('p-title').value, bio: document.getElementById('p-bio').value };
            await fetch(`${API_BASE}/profile`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            alert("Identity Synced!");
        }
    </script>
</body>
</html>
